<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ReturnIt Design Mockup Board</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=DM+Sans:wght@500;600;700;800;900&family=Fraunces:opsz,wght@9..144,500;9..144,650;9..144,800&family=Geist:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800;900&family=Sora:wght@400;500;600;700;800&display=swap');

    :root {
      color-scheme: dark;
      --page: #070809;
      --panel: #101215;
      --panel-2: #171a1f;
      --line: rgba(255,255,255,.12);
      --text: #f5f7f9;
      --muted: rgba(245,247,249,.58);
      --phone-w: 326px;
      --phone-h: 682px;
      --zoom: 1;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 0%, rgba(61,168,90,.12), transparent 28%),
        radial-gradient(circle at 88% 8%, rgba(64,141,255,.14), transparent 24%),
        linear-gradient(180deg, #090a0c 0%, #050506 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 18px 24px;
      background: rgba(7,8,9,.86);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .board-title {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px 14px;
    }

    .board-title h1 {
      margin: 0;
      font-size: 19px;
      letter-spacing: -.02em;
      line-height: 1.1;
    }

    .board-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .11em;
      text-transform: uppercase;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .theme-jump {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: rgba(255,255,255,.72);
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,.04);
    }

    .theme-jump:hover {
      color: #fff;
      border-color: rgba(255,255,255,.28);
      background: rgba(255,255,255,.08);
    }

    .board {
      display: flex;
      flex-direction: column;
      gap: 34px;
      padding: 30px 24px 56px;
    }

    .theme-section {
      --screen: #f7f5f2;
      --screen-2: #eeece8;
      --card: #ffffff;
      --card-2: #f7f5f2;
      --text-in: #0d0d0d;
      --muted-in: #6b6b6b;
      --soft-in: #9a9590;
      --border-in: #e8e4de;
      --accent: #1a5c2a;
      --accent-2: #3da85a;
      --accent-3: #e07b39;
      --danger: #dc3545;
      --shadow: rgba(0,0,0,.36);
      --radius: 18px;
      --radius-sm: 12px;
      --screen-font: "Plus Jakarta Sans", Inter, ui-sans-serif, system-ui, sans-serif;
      --display-font: "Plus Jakarta Sans", Inter, ui-sans-serif, system-ui, sans-serif;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.065), rgba(255,255,255,.025)),
        rgba(255,255,255,.035);
      box-shadow: 0 24px 90px rgba(0,0,0,.28);
      scroll-margin-top: 92px;
    }

    .theme-section[data-theme="original"] {
      --screen: #f7f5f2;
      --screen-2: #eeece8;
      --card: #ffffff;
      --card-2: #f0ece5;
      --text-in: #0d0d0d;
      --muted-in: #6b6b6b;
      --soft-in: #9a9590;
      --border-in: #e8e4de;
      --accent: #1a5c2a;
      --accent-2: #3da85a;
      --accent-3: #e07b39;
      --danger: #dc3545;
      --radius: 20px;
      --radius-sm: 14px;
      --screen-font: "Plus Jakarta Sans", Inter, ui-sans-serif, system-ui, sans-serif;
      --display-font: "Plus Jakarta Sans", Inter, ui-sans-serif, system-ui, sans-serif;
    }

    .theme-section[data-theme="heritage"] {
      --heritage-display: "Cormorant Garamond", Georgia, "Times New Roman", serif;
      --heritage-ui: "DM Sans", Inter, ui-sans-serif, system-ui, sans-serif;
      --screen: #f3eee5;
      --screen-2: #e9e0d0;
      --card: #fffaf0;
      --card-2: #f8f0e1;
      --text-in: #1e2b20;
      --muted-in: #6d6a5f;
      --soft-in: #8a8375;
      --border-in: #d8cab1;
      --accent: #294a31;
      --accent-2: #6e8f70;
      --accent-3: #b99255;
      --danger: #9b3b35;
      --radius: 18px;
      --radius-sm: 12px;
      --screen-font: var(--heritage-ui);
      --display-font: var(--heritage-display);
    }

    .theme-section[data-theme="pop"] {
      --screen: #f6f6f6;
      --screen-2: #eeeeee;
      --card: #ffffff;
      --card-2: #111111;
      --text-in: #000000;
      --muted-in: #6b6b6b;
      --soft-in: #8a8a8a;
      --border-in: #e2e2e2;
      --accent: #000000;
      --accent-2: #06c167;
      --accent-3: #276ef1;
      --danger: #d93025;
      --uber-ink: #000000;
      --uber-surface-black: #111111;
      --radius: 20px;
      --radius-sm: 14px;
      --screen-font: Manrope, Inter, "Helvetica Neue", Helvetica, Arial, ui-sans-serif, system-ui, sans-serif;
      --display-font: Sora, Manrope, Inter, "Helvetica Neue", Helvetica, Arial, ui-sans-serif, system-ui, sans-serif;
      --ui-display-font: Sora, Manrope, Inter, "Helvetica Neue", Helvetica, Arial, ui-sans-serif, system-ui, sans-serif;
    }

    .theme-section[data-theme="atlas"] {
      --screen: #f5fff2;
      --screen-2: #e3f8dc;
      --card: rgba(255,255,255,.72);
      --card-2: rgba(235,255,224,.82);
      --text-in: #172119;
      --muted-in: rgba(23,33,25,.62);
      --soft-in: rgba(23,33,25,.42);
      --border-in: rgba(31,95,45,.13);
      --accent: #087f12;
      --accent-2: #c7f7a7;
      --accent-3: #78cb62;
      --danger: #d93025;
      --radius: 31px;
      --radius-sm: 20px;
      --screen-font: Geist, Inter, ui-sans-serif, system-ui, sans-serif;
      --display-font: Manrope, Geist, Inter, ui-sans-serif, system-ui, sans-serif;
    }

    .theme-section[data-theme="atelier"] {
      --screen: #f7f5f0;
      --screen-2: #f2eee7;
      --card: rgba(255,255,255,.56);
      --card-2: rgba(255,255,255,.38);
      --text-in: #070707;
      --muted-in: rgba(7,7,7,.6);
      --soft-in: rgba(7,7,7,.42);
      --border-in: rgba(7,7,7,.18);
      --accent: #ff6a00;
      --accent-2: #ff4da6;
      --accent-3: #ffd95a;
      --danger: #e63225;
      --radius: 0px;
      --radius-sm: 0px;
      --screen-font: Inter, "SF Pro Display", ui-sans-serif, system-ui, sans-serif;
      --display-font: Inter, "SF Pro Display", ui-sans-serif, system-ui, sans-serif;
    }

    .theme-meta {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 20px;
      padding: 2px 4px 0;
    }

    .theme-kicker {
      color: rgba(255,255,255,.45);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .theme-meta h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -.03em;
    }

    .phone-row {
      display: flex;
      gap: 22px;
      overflow-x: auto;
      padding: 4px 2px 18px;
      scroll-snap-type: x proximity;
    }

    .phone-row::-webkit-scrollbar,
    .screen-scroll::-webkit-scrollbar {
      height: 10px;
      width: 0;
    }

    .phone-row::-webkit-scrollbar-track {
      background: rgba(255,255,255,.05);
      border-radius: 999px;
    }

    .phone-row::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,.18);
      border-radius: 999px;
    }

    .phone-card {
      flex: 0 0 calc(var(--phone-w) * var(--zoom));
      scroll-snap-align: start;
    }

    .phone-scale {
      width: var(--phone-w);
      transform: scale(var(--zoom));
      transform-origin: left top;
    }

    .phone {
      position: relative;
      width: var(--phone-w);
      height: var(--phone-h);
      padding: 9px;
      border-radius: 50px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.2), rgba(255,255,255,.03) 18%, rgba(0,0,0,.8) 78%),
        #0b0c0f;
      box-shadow:
        0 28px 72px var(--shadow),
        inset 0 0 0 1px rgba(255,255,255,.1),
        inset 0 -18px 45px rgba(0,0,0,.44);
    }

    .phone::before {
      content: "";
      position: absolute;
      z-index: 5;
      top: 18px;
      left: 50%;
      width: 96px;
      height: 26px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #050506;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 41px;
      background: var(--screen);
      color: var(--text-in);
      font-family: var(--screen-font);
      letter-spacing: 0;
    }

    .theme-section[data-theme="pop"] .screen {
      background:
        linear-gradient(180deg, rgba(255,255,255,.78), rgba(247,247,244,.92)),
        var(--screen);
    }

    .theme-section[data-theme="heritage"] .screen {
      background:
        linear-gradient(90deg, rgba(41,74,49,.035) 1px, transparent 1px),
        linear-gradient(rgba(41,74,49,.03) 1px, transparent 1px),
        var(--screen);
      background-size: 27px 27px;
    }

    .theme-section[data-theme="heritage"] .status,
    .theme-section[data-theme="heritage"] .concept-note,
    .theme-section[data-theme="heritage"] .concept-pill,
    .theme-section[data-theme="heritage"] .concept-nav,
    .theme-section[data-theme="heritage"] .atlas-code,
    .theme-section[data-theme="heritage"] .btn,
    .theme-section[data-theme="heritage"] .tip,
    .theme-section[data-theme="heritage"] .bullet {
      font-family: var(--heritage-ui);
    }

    .theme-section[data-theme="heritage"] .status {
      color: #171913;
      font-weight: 850;
      letter-spacing: -.01em;
    }

    .theme-section[data-theme="heritage"] .battery {
      color: #171913;
    }

    .theme-section[data-theme="heritage"] .battery i {
      width: 76%;
      background: #171913;
    }

    .theme-section[data-theme="heritage"] .concept-note {
      font-size: 11px;
      line-height: 1.42;
      font-weight: 650;
      letter-spacing: -.012em;
    }

    .theme-section[data-theme="heritage"] .atlas-code {
      color: color-mix(in srgb, var(--muted-in) 88%, var(--text-in));
      font-size: 9px;
      font-weight: 900;
      letter-spacing: .18em;
    }

    .theme-section[data-theme="heritage"] .concept-pill {
      min-height: 24px;
      padding: 0 10px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .04em;
    }

    .theme-section[data-theme="heritage"] .concept-nav {
      font-size: 10px;
      font-weight: 750;
      letter-spacing: -.01em;
    }

    .theme-section[data-theme="heritage"] .concept-nav span:first-child {
      font-family: var(--heritage-display);
      font-size: 12px;
      font-weight: 700;
    }

    .theme-section[data-theme="atlas"] .screen {
      background:
        radial-gradient(circle at 50% -10%, rgba(195,255,160,.82), transparent 40%),
        radial-gradient(circle at 78% 18%, rgba(111,194,103,.26), transparent 28%),
        linear-gradient(180deg, #f9fff6 0%, #edfbe8 48%, #f9fff5 100%),
        var(--screen);
    }

    .theme-section[data-theme="atelier"] .screen {
      background:
        radial-gradient(circle at 18% 50%, rgba(255,106,0,.42), transparent 25%),
        radial-gradient(circle at 78% 30%, rgba(255,77,166,.36), transparent 31%),
        radial-gradient(circle at 80% 82%, rgba(255,217,90,.42), transparent 28%),
        linear-gradient(180deg, #fffdfa 0%, #f6f2ed 100%);
    }

    .theme-section[data-theme="atelier"] .status {
      color: #070707;
    }

    .theme-section[data-theme="atelier"] .battery {
      width: 24px;
      height: 12px;
      border-color: #070707;
    }

    .theme-section[data-theme="atelier"] .battery::after,
    .theme-section[data-theme="atelier"] .battery i {
      background: #070707;
    }

    .theme-section[data-theme="atelier"] .battery i {
      width: 76%;
    }

    .status {
      height: 39px;
      padding: 14px 20px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-in);
      flex-shrink: 0;
    }

    .phone-bars {
      display: inline-flex;
      gap: 3px;
      align-items: end;
      height: 12px;
      color: var(--text-in);
    }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: currentColor;
      opacity: .92;
    }

    .bar:nth-child(1) { height: 5px; }
    .bar:nth-child(2) { height: 7px; }
    .bar:nth-child(3) { height: 10px; }
    .bar:nth-child(4) { height: 8px; opacity: .38; }

    .battery {
      width: 23px;
      height: 11px;
      border-radius: 3px;
      border: 1.5px solid currentColor;
      padding: 1px;
      position: relative;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 3px;
      width: 2px;
      height: 5px;
      border-radius: 1px;
      background: currentColor;
    }

    .battery i {
      display: block;
      width: 70%;
      height: 100%;
      border-radius: 2px;
      background: var(--accent-2);
    }

    .screen-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 18px 10px;
      flex-shrink: 0;
    }

    .screen-title {
      font-size: 17px;
      font-weight: 850;
      letter-spacing: -.03em;
      line-height: 1.1;
    }

    .back, .icon-btn {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid transparent;
      background: var(--screen-2);
      color: var(--text-in);
    }

    .theme-section[data-theme="atlas"] .back,
    .theme-section[data-theme="atlas"] .icon-btn {
      border-radius: 50%;
      background: rgba(255,255,255,.72);
      border-color: rgba(31,95,45,.08);
      box-shadow: 0 8px 20px rgba(31,95,45,.08);
    }

    .screen-scroll {
      flex: 1;
      overflow: hidden;
      padding: 0 18px 86px;
    }

    .no-nav .screen-scroll {
      padding-bottom: 18px;
    }

    .app-col {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      padding: 10px 16px 22px;
      background: linear-gradient(180deg, rgba(0,0,0,0), var(--screen) 22%);
      border-top: 1px solid color-mix(in srgb, var(--border-in) 82%, transparent);
    }

    .nav-item {
      min-height: 54px;
      border-radius: 17px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--soft-in);
      font-size: 10px;
      font-weight: 800;
    }

    .nav-item.active {
      background: var(--accent);
      color: #fff;
    }

    .theme-section[data-theme="pop"] .nav-item.active,
    .theme-section[data-theme="atlas"] .nav-item.active {
      color: #fff;
    }

    .tiny-icon {
      width: 18px;
      height: 18px;
      display: block;
    }

    .btn {
      width: 100%;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 850;
      letter-spacing: -.01em;
      box-shadow: 0 12px 28px color-mix(in srgb, var(--accent) 28%, transparent);
    }

    .theme-section[data-theme="pop"] .btn,
    .theme-section[data-theme="atlas"] .btn {
      color: #fff;
    }

    .btn.secondary {
      border: 1.5px solid var(--border-in);
      background: transparent;
      color: var(--accent);
      box-shadow: none;
    }

    .theme-section[data-theme="original"] .btn.dark,
    .btn.dark {
      background: var(--text-in);
      color: var(--screen);
      box-shadow: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border-in);
      border-radius: var(--radius);
      padding: 14px;
      color: var(--text-in);
      box-shadow: 0 12px 36px rgba(0,0,0,.05);
    }

    .theme-section[data-theme="atelier"] .card.bright {
      background: var(--card);
      color: #161719;
      border-color: transparent;
    }

    .theme-section[data-theme="atelier"] .card,
    .theme-section[data-theme="atelier"] .option-card {
      color: #17191c;
    }

    .theme-section[data-theme="atelier"] .card .mini-label,
    .theme-section[data-theme="atelier"] .card .muted,
    .theme-section[data-theme="atelier"] .option-card .bullet {
      color: #6f665b;
    }

    .theme-section[data-theme="atelier"] .card .eyebrow {
      color: #817669;
    }

    .theme-section[data-theme="atelier"] .card .money,
    .theme-section[data-theme="atelier"] .card strong,
    .theme-section[data-theme="atelier"] .option-card strong {
      color: #17191c;
    }

    .theme-section[data-theme="atelier"] .tip {
      color: #17191c;
    }

    .theme-section[data-theme="atelier"] .tip.active {
      background: #17191c;
      border-color: #17191c;
      color: #f4efe5;
    }

    .card + .card {
      margin-top: 10px;
    }

    .soft-panel {
      background: var(--screen-2);
      border: 1px solid var(--border-in);
      border-radius: var(--radius-sm);
      padding: 12px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .eyebrow {
      color: var(--soft-in);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: .09em;
      text-transform: uppercase;
    }

    .muted {
      color: var(--muted-in);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 16%, var(--screen));
      color: var(--accent);
      font-size: 10px;
      font-weight: 850;
      white-space: nowrap;
    }

    .badge.hot {
      background: color-mix(in srgb, var(--accent-3) 18%, var(--screen));
      color: var(--accent-3);
    }

    .logo-mark {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      border-radius: 24px;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 18px 42px color-mix(in srgb, var(--accent) 34%, transparent);
    }

    .theme-section[data-theme="pop"] .logo-mark,
    .theme-section[data-theme="atlas"] .logo-mark {
      color: #fff;
    }

    .brand {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: -.08em;
      line-height: .96;
    }

    .brand span {
      color: var(--accent-2);
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .hero-bg::before,
    .hero-bg::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 24%, transparent);
      filter: blur(.2px);
    }

    .hero-bg::before {
      width: 210px;
      height: 210px;
      right: -58px;
      top: -60px;
    }

    .hero-bg::after {
      width: 142px;
      height: 142px;
      left: -52px;
      top: 64px;
      background: color-mix(in srgb, var(--accent-2) 14%, transparent);
    }

    .home-hero {

      box-shadow: 0 -18px 42px rgba(17,17,17,.12);
    }

    .uber-input {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 10px;
      align-items: center;
      min-height: 44px;
      border-radius: 12px;
      background: #f3f3ef;
      padding: 0 12px;
      color: var(--uber-ink);
      font-size: 13px;
      font-weight: 750;
    }

    .uber-input + .uber-input {
      margin-top: 8px;
    }

    .uber-dot-icon {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--uber-surface-black);
    }

    .uber-dot-icon.square {
      border-radius: 2px;
      background: var(--accent-2);
    }

    .uber-price {
      color: var(--uber-ink);
      font-variant-numeric: tabular-nums;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .uber-mini-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .uber-mini-row {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid #e8e8e4;
    }

    .uber-icon-disc {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #f1f1ed;
      color: var(--uber-ink);
      font-size: 14px;
      font-weight: 600;
    }

    .uber-phone-arrow {
      background: var(--uber-surface-black);
      color: #fff;
    }

    .uber-phone-arrow svg {
      width: 18px;
      height: 18px;
      display: block;
      transform: translateX(-.5px);
    }

    .uber-amount {
      color: var(--uber-ink);
      font-family: var(--display-font);
      font-size: 43px;
      line-height: .95;
      font-weight: 700;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .uber-meter {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #e9e9e4;
    }

    .uber-meter i {
      display: block;
      width: 68%;
      height: 100%;
      border-radius: inherit;
      background: var(--uber-surface-black);
    }

    .uber-driver-photo {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        linear-gradient(135deg, #111 0 50%, #2a2a2a 51%),
        var(--uber-surface-black);
      color: #fff;
      font-size: 15px;
      font-weight: 850;
      box-shadow: inset 0 0 0 2px #fff, 0 8px 22px rgba(17,17,17,.18);
    }

    .uber-proof {
      height: 148px;
      border: 1px dashed #c9c9c4;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(39,110,241,.08), rgba(6,193,103,.08)),
        #f6f6f2;
      text-align: center;
    }

    .uber-camera-icon {
      position: relative;
      width: 32px;
      height: 25px;
      margin: 0 auto 10px;
      border: 3px solid var(--uber-surface-black);
      border-radius: 8px;
    }

    .uber-camera-icon::before {
      content: "";
      position: absolute;
      left: 8px;
      top: -7px;
      width: 11px;
      height: 6px;
      border-radius: 4px 4px 0 0;
      background: var(--uber-surface-black);
    }

    .uber-camera-icon::after {
      content: "";
      position: absolute;
      left: 9px;
      top: 6px;
      width: 8px;
      height: 8px;
      border: 2px solid var(--uber-surface-black);
      border-radius: 50%;
      background: #f6f6f2;
    }

    .uber-camera-svg {
      width: 36px;
      height: 36px;
      display: block;
      margin: 0 auto 8px;
      color: var(--uber-ink);
    }

    @supports not (color: color-mix(in srgb, white, black)) {
      .badge { background: var(--screen-2); }
      .home-hero { background: var(--accent); }
      .btn { box-shadow: none; }
    }

    @media (max-width: 760px) {
      .topbar,
      .theme-meta {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .board {
        padding-left: 14px;
        padding-right: 14px;
      }

      .theme-section {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="board-title">
      <h1>ReturnIt Design Mockup Board</h1>
      <span id="screen-count">5 themes / 35 iPhone screens</span>
    </div>
    <nav class="top-actions" id="theme-nav" aria-label="Jump to theme"></nav>
  </header>

  <main class="board" id="board"></main>

  <script>
    if ("scrollRestoration" in window.history) {
      window.history.scrollRestoration = "manual";
    }

    const themes = [
      {
        id: "original",
        no: "01",
        name: "Original ReturnIt",
        short: "Original"
      },
      {
        id: "heritage",
        no: "02",
        name: "Design 2",
        short: "Design 2"
      },
      {
        id: "pop",
        no: "03",
        name: "Design 3 · Uber Mode",
        short: "Design 3"
      },
      {
        id: "atlas",
        no: "04",
        name: "Design 4",
        short: "Design 4"
      },
      {
        id: "atelier",
        no: "05",
        name: "Design 5",
        short: "Design 5"
      }
    ];

    const screens = [
      { id: "welcome", label: "Onboarding", sub: "Customer entry" },
      { id: "home", label: "Customer Home", sub: "Active returns" },
      { id: "options", label: "Return Options", sub: "Standard vs Premium" },
      { id: "checkout", label: "Checkout", sub: "Confirm and pay" },
      { id: "tracking", label: "Tracking", sub: "Driver status" },
      { id: "driver", label: "Driver Home", sub: "Jobs and map" },
      { id: "proof", label: "Proof Flow", sub: "Store verification" }
    ];

    function icon(name) {
      const stroke = "currentColor";
      const base = {
        home: `<path d="M3.5 9.5 11 3.5l7.5 6V19a1 1 0 0 1-1 1H5.5a1 1 0 0 1-1-1V9.5Z" fill="none" stroke="${stroke}" stroke-width="1.8" stroke-linejoin="round"/><path d="M8.5 20v-6h5v6" fill="none" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round"/>`,
        jobs: `<rect x="5" y="4" width="12" height="15" rx="2.4" fill="none" stroke="${stroke}" stroke-width="1.8"/><path d="M8 9h6M8 12.5h4" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round"/>`,
        user: `<circle cx="11" cy="8" r="3.5" fill="none" stroke="${stroke}" stroke-width="1.8"/><path d="M4 19c.7-3.3 3.4-5 7-5s6.3 1.7 7 5" fill="none" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round"/>`,
        card: `<rect x="3.5" y="6" width="15" height="10.5" rx="2" fill="none" stroke="${stroke}" stroke-width="1.8"/><path d="M4 9.5h14" stroke="${stroke}" stroke-width="1.8"/>`,
        plus: `<path d="M11 4.5v13M4.5 11h13" stroke="${stroke}" stroke-width="2.3" stroke-linecap="round"/>`,
        route: `<path d="M5 17c5-8 7 0 12-8" fill="none" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round"/><circle cx="5" cy="17" r="2" fill="none" stroke="${stroke}" stroke-width="1.6"/><circle cx="17" cy="9" r="2" fill="none" stroke="${stroke}" stroke-width="1.6"/>`,
        check: `<path d="M4.5 11.2 8.7 15.4 17 6" fill="none" stroke="${stroke}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>`,
        bell: `<path d="M11 3.5a5.4 5.4 0 0 0-5.4 5.4v2.7l-1.4 2.3a.9.9 0 0 0 .8 1.4h12a.9.9 0 0 0 .8-1.4l-1.4-2.3V8.9A5.4 5.4 0 0 0 11 3.5Z" fill="none" stroke="${stroke}" stroke-width="1.7"/><path d="M9.2 16a1.9 1.9 0 0 0 3.6 0" fill="none" stroke="${stroke}" stroke-width="1.7" stroke-linecap="round"/>`,
        arrow: `<path d="M12.5 5.5 7 11l5.5 5.5" fill="none" stroke="${stroke}" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>`
      };
      return `<svg class="tiny-icon" viewBox="0 0 22 22" aria-hidden="true">${base[name] || base.check}</svg>`;
    }

    function returnItLogoIcon(size = 42) {
      return `
        <svg width="${size}" height="${size}" viewBox="0 0 44 44" fill="none" aria-hidden="true">
          <path d="M9 23.6C8.2 16 13.8 9.1 21.5 8.5c5.1-.4 9.8 2 12.4 6" stroke="currentColor" stroke-width="3.6" stroke-linecap="round"/>
          <path d="M32.4 9.5 35.4 16.2 28 16.4Z" fill="currentColor"/>
          <path d="M35 20.4C35.8 28 30.2 34.9 22.5 35.5c-5.1.4-9.8-2-12.4-6" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" opacity=".72"/>
          <path d="M11.6 34.5 8.6 27.8 16 27.6Z" fill="currentColor" opacity=".72"/>
          <path d="M13.8 26c0-4.5 3.5-7.9 8-7.9h.4c4.5 0 8 3.4 8 7.9s-3.5 7.9-8 7.9h-2.8l-5.6 3.6 1.8-5.7A7.8 7.8 0 0 1 13.8 26Z" fill="#129CFF" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
        </svg>
      `;
    }

    function statusBar() {
      return `
        <div class="status">
          <span>9:41</span>
          <span class="row" style="gap:7px;color:var(--text-in)">
            <span class="phone-bars"><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i></span>
            <span style="font-size:10px;font-weight:900">5G</span>
            <span class="battery"><i></i></span>
          </span>
        </div>
      `;
    }

    function nav(title, options = {}) {
      const left = options.back ? `<div class="back">${icon("arrow")}</div>` : `<div style="width:36px"></div>`;
      const right = options.right ? `<div class="icon-btn">${icon(options.right)}</div>` : `<div style="width:36px"></div>`;
      return `
        <div class="screen-head">
          ${left}
          <div class="screen-title">${title}</div>
          ${right}
        </div>
      `;
    }

    function bottomNav(active, driver = false) {
      const items = driver
        ? [["home", "Home"], ["jobs", "Jobs"], ["card", "Earn"]]
        : [["home", "Home"], ["jobs", "Returns"], ["user", "Profile"]];
      return `
        <div class="bottom-nav">
          ${items.map(([key, label]) => `
            <div class="nav-item ${active === key ? "active" : ""}">
              ${icon(key)}
              <span>${label}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function app(body, options = {}) {
      return `
        <div class="app-col ${options.nav ? "" : "no-nav"}">
          ${statusBar()}
          ${options.title ? nav(options.title, options) : ""}
          <div class="screen-scroll">${body}</div>
          ${options.nav ? bottomNav(options.active || "home", options.driver) : ""}
        </div>
      `;
    }

    function mapBlock(label = "Route") {
      return `
        <div class="map" aria-label="${label}">
          <span class="map-block one"></span>
          <span class="map-block two"></span>
          <span class="map-block three"></span>
          <span class="map-road main"></span>
          <span class="map-road cross"></span>
          <span class="map-road local"></span>
          <span class="route"></span>
          <span class="pin start"><b>A</b></span>
          <span class="pin end"><b>B</b></span>
          <span class="map-car-dot">3</span>
        </div>
      `;
    }

    const conceptIds = new Set(["heritage", "pop", "atlas", "atelier"]);

    function conceptNav(active = "Home", driver = false, themeId = "") {
      const items = driver ? ["Home", "Jobs", "Earnings"] : ["Home", themeId === "original" ? "Jobs" : "Returns", "Profile"];
      return `<div class="concept-nav">${items.map(item => `<span>${item}</span>`).join("")}</div>`;
    }

    function conceptFrame(theme, body, options = {}) {
      return `
        <div class="concept ${theme.id === "heritage" ? "concept-serif" : ""} ${options.dark ? "concept-dark" : ""}">
          ${statusBar()}
          <div class="concept-body" style="${options.compact ? "padding-bottom:72px" : ""}">${body}</div>
          ${options.nav ? conceptNav(options.active, options.driver, theme.id) : ""}
        </div>
      `;
    }

    function simpleTop(title, meta = "") {
      return `
        <div class="row" style="margin:2px 0 16px">
          <div class="back" style="width:32px;height:32px">${icon("arrow")}</div>
          <div style="text-align:center">
            <div style="font-size:14px;font-weight:900">${title}</div>
            ${meta ? `<div class="concept-note" style="font-size:10px">${meta}</div>` : ""}
          </div>
          <div style="width:32px"></div>
        </div>
      `;
    }

    function brandMark(label = "Return.") {
      return `<div style="font-size:15px;font-weight:800;color:var(--accent);font-style:italic">${label}</div>`;
    }

    function productGhost(label) {
      return `<div class="product-ghost">${label}</div>`;
    }

    function miniTimeline(items) {
      return `
        <div style="display:flex;flex-direction:column;gap:11px">
          ${items.map((item, i) => `
            <div style="display:grid;grid-template-columns:18px 1fr;gap:8px;align-items:start">
              <span style="width:10px;height:10px;border-radius:50%;background:${i < 2 ? "var(--accent)" : "transparent"};border:1px solid var(--border-in);margin-top:3px"></span>
              <div>
                <div style="font-size:12px;font-weight:850;color:var(--text-in)">${item[0]}</div>
                <div class="concept-note" style="font-size:10px">${item[1]}</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function conceptCard(theme) {
      if (theme.id === "pop") return "ui-card pop-card";
      if (theme.id === "atlas") return "ui-card atlas-panel";
      if (theme.id === "atelier") return "ui-card atelier-card";
      return "ui-card";
    }

    function itemTile(emoji) {
      const productClass = {
        "👟": "product-shoes",
        "🎧": "product-audio",
        "👖": "product-apparel",
        "🧥": "product-apparel",
        "📦": "product-apparel"
      }[emoji] || "product-generic";
      return `<div class="asset-tile product-tile ${productClass}">${emoji}</div>`;
    }

    function conceptBadge(text, tone = "") {
      return `<span class="badge ${tone}">${text}</span>`;
    }

    function conceptMap(label = "Map") {
      return `
        <div class="${label === "Navigate" ? "atlas-map" : "map"}" style="min-height:126px;margin-bottom:12px">
          <span class="route"></span>
          <span class="pin start"><b>A</b></span>
          <span class="pin end"><b>B</b></span>
        </div>
      `;
    }

    const RT = {
      live: "Now live in Brickell, Miami",
      address: "123 Main Street, Apt 4B",
      item1: "Nike Air Max 90",
      item2: "Apple AirPods Pro",
      store1: "Target · Downtown",
      store2: "Best Buy · Mall",
      eta: "ETA 25 min",
      wait: "Waiting for driver",
      fee: "$12 / package",
      premium: "$30 / package",
      total: "$19.10",
      driver: "John D.",
      vehicle: "Toyota Camry · ABC 123",
      rating: "⭐ 4.9 (342 trips)"
    };

    function heritageReturnIt(theme, screen) {
      const frame = (body, opts = {}) => conceptFrame(theme, `<div class="heritage-shell">${body}</div>`, opts);
      if (screen === "welcome") return frame(`
        <div class="row" style="margin:20px 0 0"><div class="heritage-logo">ReturnIt</div><div class="atlas-code">HASSLE-FREE RETURNS</div></div>
        <div class="heritage-welcome-lockup">
          <div class="heritage-title">Return<span style="color:var(--accent)">It</span></div>
          <div class="heritage-hero-art"><img src="assets/returnit-3d-car-bag-package-cutout.png" alt=""></div>
        </div>
        <div class="heritage-phone-prompt">
          <div class="heritage-phone-label">Start with your mobile number</div>
          <div class="heritage-phone-row">
            <span class="heritage-phone-code">+1</span>
            <span class="heritage-phone-number">(305) 555-0148</span>
            <span class="heritage-phone-go">→</span>
          </div>
          <div class="concept-note" style="text-align:center;font-size:10px;margin-top:12px">Already a member? <b style="color:var(--accent)">Sign in</b></div>
        </div>
      `);
      if (screen === "home") return frame(`
        <div class="row" style="margin:12px 0 22px"><div class="heritage-logo">ReturnIt</div><div class="avatar" style="width:30px;height:30px;border-radius:50%;font-size:11px;background:var(--accent);color:var(--screen)">SJ</div></div>
        <div class="heritage-display" style="font-size:28px;line-height:.96;margin:28px 0 18px">Good morning 👋</div>
        <div class="heritage-card" style="margin-bottom:12px">
          <div class="atlas-code">PICKUP ADDRESS</div>
          <div style="font-size:14px;font-weight:800;margin-top:7px">📍 ${RT.address}</div>
        </div>
        ${[[RT.item1, `${RT.store1} · ${RT.eta}`, "👟", "In Transit"], [RT.item2, `${RT.store2} · ${RT.wait}`, "🎧", "Pending"]].map((r, i) => `<div class="heritage-card" style="margin-bottom:12px">
          <div class="atlas-code">${r[3]}</div>
          <div class="row" style="margin-top:10px">${itemTile(r[2])}<div style="flex:1"><div style="font-size:15px;font-weight:800">${r[0]}</div><div class="concept-note" style="font-size:10px">${r[1]}</div></div></div>
          ${i === 0 ? `<div class="row" style="margin-top:14px;border-top:1px solid var(--border-in);padding-top:10px"><span class="concept-note" style="font-size:10px">See all →</span><b style="font-size:10px">Track →</b></div>` : ""}
        </div>`).join("")}
        <div class="atlas-code" style="margin:14px 0 8px">Create New Return</div>
        <div class="heritage-card" style="background:var(--accent);color:var(--screen);border-color:var(--accent)">
          <div class="row"><div class="heritage-display" style="font-size:22px;line-height:1">Create New Return</div><div style="width:38px;height:38px;border-radius:50%;background:var(--screen);color:var(--accent);display:grid;place-items:center">→</div></div>
          <div style="font-size:10px;margin-top:12px;color:rgba(255,255,255,.72)">Apparel · from $12</div>
        </div>
      `);
      if (screen === "options") return frame(`
        ${simpleTop("Choose Return Option")}
        <div class="atlas-code">Standard</div>
        <div class="heritage-title" style="font-size:31px;margin:8px 0 16px">Choose Return Option</div>
        ${[["Standard", RT.fee, ["Package routed through our return hub", "Return completed the next day", "Pickup window: 10:30 PM – 2:30 AM", "Most cost-effective option"]], ["Premium", RT.premium, ["Faster, priority pickup option", "Direct delivery to store — no hub", "Driver assigned immediately", "Same-day or next-morning handling", "Exchange option available"]]].map((o, i) => `<div class="heritage-card" style="margin-bottom:12px;${i === 0 ? "border-color:var(--accent)" : ""}">
          <div class="heritage-plan-head"><div class="heritage-display" style="font-size:23px;line-height:1">${o[0]}</div><div class="heritage-plan-price">${o[1].replace(" / package", "<span>/ package</span>")}</div></div>
          ${o[2].map(b => `<div class="bullet">${b}</div>`).join("")}
        </div>`).join("")}
        <button class="btn dark" style="position:absolute;left:20px;right:20px;bottom:28px;width:auto;border-radius:999px">Continue</button>
      `);
      if (screen === "checkout") return frame(`
        ${simpleTop("Confirm Return")}
        <div class="heritage-card">
          <div class="atlas-code">Return Summary</div>
          ${[["Item", RT.item1], ["Pickup", "123 Main St"], ["Store", RT.store1], ["Time", "Today, 12PM – 3PM"]].map(r => `<div class="row" style="padding:9px 0;border-bottom:1px solid var(--border-in)"><span class="concept-note">${r[0]}</span><b>${r[1]}</b></div>`).join("")}
          <div class="divider"></div>
          ${[["Base Fee (Standard)", "$12.00"], ["Distance Surcharge", "$1.50"], ["Service Fee", "$0.60"]].map(r => `<div class="row" style="padding:5px 0"><span class="concept-note">${r[0]}</span><span>${r[1]}</span></div>`).join("")}
          <div style="font-size:13px;font-weight:800;margin:10px 0">Add Tip</div>
          <div class="tip-row">${["$0","$2","$5","$10","Custom"].map(t => `<div class="tip ${t === "$5" ? "active" : ""}">${t}</div>`).join("")}</div>
          <div class="row" style="margin-top:18px"><span class="heritage-display" style="font-size:24px">Total</span><span class="heritage-money" style="font-size:31px"><span class="currency">$</span>19<span class="cents">.10</span></span></div>
        </div>
        <button class="btn dark" style="position:absolute;left:20px;right:20px;bottom:28px;width:auto;border-radius:999px">Confirm & Pay</button>
      `);
      if (screen === "tracking") return frame(`
        ${simpleTop("Return #12345")}
        <div class="heritage-map"></div>
        <div class="atlas-code">In Transit</div>
        <div class="heritage-title" style="font-size:31px;margin:8px 0 8px">Status</div>
        ${miniTimeline([["Pickup Scheduled", "2:00 PM"], ["Driver En Route", "2:10 PM"], ["Package Picked Up", "2:18 PM"], ["Package Received at Hub", ""], ["Return Completed", ""]])}
        <div class="heritage-card row" style="position:absolute;left:20px;right:20px;bottom:18px;padding:10px">
          <div class="avatar" style="width:32px;height:32px;border-radius:50%;background:var(--accent);color:var(--screen)">J</div>
          <div style="flex:1"><div style="font-size:12px;font-weight:900">${RT.driver}</div><div class="concept-note" style="font-size:9px">${RT.vehicle}</div><div class="concept-note" style="font-size:9px">${RT.rating}</div></div>
          <div class="avatar" style="width:30px;height:30px;border-radius:50%;background:var(--accent);color:var(--screen)">☎</div>
        </div>
      `);
      if (screen === "driver") return frame(`
        <div class="row" style="margin:12px 0 24px"><div class="heritage-logo">ReturnIt</div><span class="concept-pill">Online</span></div>

          <div class="title-xl" style="font-size:21px;margin-bottom:12px">Confirm Return</div>

          <div class="card">
            ${[
              ["Item", "Nike Air Max 90"],
              ["Pickup", "123 Main St"],
              ["Store", "Target Downtown"],
              ["Time", "Today, 12 PM - 3 PM"]
            ].map(([k, v]) => `
              <div class="row" style="padding:7px 0;border-bottom:1px solid var(--border-in)">
                <span class="mini-label">${k}</span>
                <strong style="font-size:12px">${v}</strong>
              </div>
            `).join("")}
          </div>

          <div style="height:10px"></div>

          <div class="card">
            <div class="row" style="padding:5px 0"><span class="mini-label">Base Fee</span><span style="font-size:13px;font-weight:750">$12.00</span></div>
            <div class="row" style="padding:5px 0"><span class="mini-label">Distance</span><span style="font-size:13px;font-weight:750">$1.50</span></div>
            <div class="row" style="padding:5px 0"><span class="mini-label">Service</span><span style="font-size:13px;font-weight:750">$0.60</span></div>
            <div class="divider"></div>
            <div style="font-size:13px;font-weight:900;margin-bottom:9px">Add Tip</div>
            <div class="tip-row">
              ${["$0", "$2", "$5", "$10", "Custom"].map(v => `<div class="tip ${v === "$5" ? "active" : ""}">${v}</div>`).join("")}
            </div>
            <div class="divider"></div>
            <div class="row">
              <span style="font-size:15px;font-weight:950">Total</span>
              <span style="font-size:20px;font-weight:950;letter-spacing:-.04em">$19.10</span>
            </div>
          </div>

          <div style="height:14px"></div>
          <button class="btn dark">Confirm & Pay</button>
          <div style="height:9px"></div>
          <div class="row soft-panel">
            <div class="row" style="justify-content:flex-start;gap:9px">
              ${icon("card")}
              <span style="font-size:12px;font-weight:850">Visa ending 4242</span>
            </div>
            <span class="badge">Ready</span>
          </div>
        </div>
      `, { title: "Checkout", back: true });
    }

    function tracking(theme) {
      if (conceptIds.has(theme.id)) return conceptScreen(theme, "tracking");
      return app(`
        <div class="card">
          <div style="font-size:14px;font-weight:950;margin-bottom:13px">Status</div>
          <div class="timeline">
            ${[
              ["Pickup Scheduled", "2:00 PM", true],
              ["Driver En Route", "2:10 PM", true],
              ["Package Picked Up", "2:18 PM", true],
              ["Received at Hub", "", false],
              ["Return Completed", "", false]
            ].map(([label, time, done]) => `
              <div class="step ${done ? "done" : ""}">
                <span class="dot"></span>
                <div><strong>${label}</strong><span>${done ? "Complete" : "Pending"}</span></div>
                <span>${time}</span>
              </div>
            `).join("")}
          </div>
        </div>

        <div style="height:10px"></div>
        <div class="card row">
          <div class="avatar" style="border-radius:999px;background:var(--screen-2);color:var(--text-in)">JD</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:950">John D.</div>
            <div class="mini-label">Toyota Camry · ABC 123</div>
            <div style="font-size:12px;font-weight:850;color:var(--accent)">4.9 rating · 342 trips</div>
          </div>
          <div class="icon-btn">${icon("bell")}</div>
        </div>

        <div style="height:10px"></div>
        ${mapBlock("Tracking map")}
        <div style="height:14px"></div>
        <button class="btn secondary">Cancel Return</button>
        <div style="height:9px"></div>
        <button class="btn" style="background:var(--danger);box-shadow:none">Report an Issue</button>
      `, { title: "Return #12345", back: true });
    }

    function driver(theme) {
      if (conceptIds.has(theme.id)) return conceptScreen(theme, "driver");
      return app(`
        <div class="row" style="margin:4px 0 14px">
          <div>
            <div class="mini-label">Welcome back</div>
            <div class="title-xl">Driver Home</div>
          </div>
          <div class="icon-btn" style="position:relative">${icon("bell")}<span style="position:absolute;right:-2px;top:-2px;width:15px;height:15px;border-radius:999px;background:var(--danger);color:#fff;font-size:9px;display:grid;place-items:center;font-weight:950">2</span></div>
        </div>

        <div class="card row">
          <div>
            <div style="font-size:15px;font-weight:950;color:var(--accent)">You're Online</div>
            <div class="mini-label">Ready to accept jobs</div>
          </div>
          <div class="toggle"><i></i></div>
        </div>

        <div style="height:10px"></div>
        ${mapBlock("Driver location")}
        <div style="height:14px"></div>

        <div class="row" style="margin-bottom:10px">
          <div style="font-size:15px;font-weight:950">Available Jobs</div>
          <span class="badge hot">ASAP</span>
        </div>

        <div class="card">
          <div class="row" style="align-items:flex-start;margin-bottom:9px">
            <div>
              <div style="font-size:14px;font-weight:950">Nike Air Max 90</div>
              <div class="mini-label">Clothing · Medium</div>
            </div>
            <div style="font-size:20px;font-weight:950;letter-spacing:-.04em">$15</div>
          </div>
          <div class="mini-label">123 Main St -> Target Downtown · 2.3 mi</div>
          <div style="height:12px"></div>
          <div class="row">
            <button class="btn secondary" style="min-height:38px">Details</button>
            <button class="btn dark" style="min-height:38px">Accept</button>
          </div>
        </div>

        <div style="height:10px"></div>
        <div class="card row">
          <div>
            <div class="eyebrow">Today's earnings</div>
            <div class="money" style="font-size:26px;margin-top:4px">$45.00</div>
          </div>
          <span style="font-size:12px;color:var(--accent);font-weight:950">View</span>
        </div>
      `, { nav: true, active: "home", driver: true });
    }

    function proof(theme) {
      if (conceptIds.has(theme.id)) return conceptScreen(theme, "proof");
      return app(`
        <div class="card bright">
          <div class="row">
            <div>
              <div class="eyebrow">Store verification</div>
              <div style="font-size:17px;font-weight:950;margin-top:5px">Target Downtown</div>
              <div class="mini-label">Show proof, capture receipt, submit result.</div>
            </div>
            <span class="badge">Step 3/4</span>
          </div>
        </div>

        <div style="height:11px"></div>
        <div class="proof-grid">
          <div class="upload">
            <div>
              <div style="font-size:24px;line-height:1">+</div>
              <div>Proof of purchase</div>
            </div>
          </div>
          <div class="receipt-art" aria-label="Receipt preview">
            <div style="width:75%"></div>
            <div style="width:55%"></div>
            <div style="width:86%"></div>
            <div style="width:66%"></div>
            <div style="width:42%"></div>
          </div>
        </div>

        <div style="height:11px"></div>
        <div class="card">
          <div class="eyebrow" style="margin-bottom:8px">Customer Preferences</div>
          <div class="soft-panel" style="font-size:13px;font-weight:900">Same item, size M</div>
        </div>

        <div style="height:10px"></div>
        <div class="card">
          <div class="eyebrow" style="margin-bottom:10px">Return Result</div>
          <div class="stack">
            <div class="option-card selected row" style="padding:10px 12px">
              <span style="font-size:13px;font-weight:900">Refund approved</span>
              ${icon("check")}
            </div>
            <div class="option-card row" style="padding:10px 12px">
              <span style="font-size:13px;font-weight:900">Store credit issued</span>
            </div>
          </div>
        </div>

        <div style="height:12px"></div>
        <div class="card row">
          <div>
            <div class="eyebrow">Your earnings</div>
            <div class="money" style="font-size:28px;margin-top:4px">$20.00</div>
          </div>
          <div style="text-align:right">
            <div class="mini-label">Base $15</div>
            <div class="mini-label">Tip $5</div>
          </div>
        </div>

        <div style="height:12px"></div>
        <button class="btn">Submit & Complete Job</button>
      `, { title: "Upload Proof", back: true });
    }

    const builders = { welcome, home, options, checkout, tracking, driver, proof };

    function renderPhone(theme, screen, index) {
      return `
        <article class="phone-card">
          <div class="phone-scale">
            <div class="phone">
              <div class="screen">
                ${builders[screen.id](theme)}
              </div>
            </div>
            <div class="caption">
              ${String(index + 1).padStart(2, "0")} ${screen.label}
              <span>${screen.sub}</span>
            </div>
          </div>
        </article>
      `;
    }

    function renderTheme(theme) {
      return `
        <section class="theme-section" data-theme="${theme.id}" id="${theme.id}">
          <div class="theme-meta">
            <div>
              <div class="theme-kicker">Style ${theme.no}</div>
              <h2>${theme.name}</h2>
            </div>
          </div>
          <div class="phone-row">
            ${screens.map((screen, index) => renderPhone(theme, screen, index)).join("")}
          </div>
        </section>
      `;
    }

    document.getElementById("board").innerHTML = themes.map(renderTheme).join("");
    document.getElementById("theme-nav").innerHTML = themes
      .map(theme => `<a class="theme-jump" href="#${theme.id}">${theme.no} ${theme.short}</a>`)
      .join("");
    document.getElementById("screen-count").textContent = `${themes.length} themes / ${themes.length * screens.length} iPhone screens`;
    function resetRows() {
      document.querySelectorAll(".phone-row").forEach(row => {
        row.scrollLeft = 0;
      });
    }
    function syncHash() {
      const target = window.location.hash ? document.querySelector(window.location.hash) : null;
      const align = () => {
        if (target) target.scrollIntoView({ block: "start" });
        resetRows();
      };
      align();
      window.setTimeout(align, 80);
      window.setTimeout(align, 240);
      window.setTimeout(align, 600);
    }
    syncHash();
    window.addEventListener("hashchange", () => window.requestAnimationFrame(syncHash));
  </script>
</body>
</html>
